name: 🚀 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run linting
        run: pnpm lint

  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build packages
        run: pnpm build:all

      - name: 🔍 Run linting
        run: pnpm lint

      - name: 🧪 Run unit tests
        run: |
          pnpm --filter astro-prometheus-node-integration test -- --run
          pnpm --filter astro-opentelemetry-integration test -- --run

  e2e-prometheus:
    name: 🧪 E2E Tests - Prometheus
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build packages
        run: pnpm build:all

      - name: 🎭 Install Playwright browsers
        run: pnpx playwright install --with-deps

      - name: 🧪 Run Prometheus E2E tests
        run: pnpm test:e2e:ci
        working-directory: playgrounds/prometheus

      - name: 📊 Upload Prometheus test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: prometheus-e2e-results
          path: playgrounds/prometheus/test-results/
          retention-days: 30

      - name: 📊 Upload Prometheus Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: prometheus-playwright-report
          path: playgrounds/prometheus/playwright-report/
          retention-days: 30

  e2e-prometheus-astro5:
    name: 🧪 E2E Tests - Prometheus (Astro 5)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build packages
        run: pnpm build:all

      - name: 🎭 Install Playwright browsers
        run: pnpx playwright install --with-deps

      - name: 🧪 Run Prometheus E2E tests (Astro 5)
        run: pnpm test:e2e:ci
        working-directory: playgrounds/prometheus-astro5

      - name: 📊 Upload Prometheus Astro 5 test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: prometheus-astro5-e2e-results
          path: playgrounds/prometheus-astro5/test-results/
          retention-days: 30

      - name: 📊 Upload Prometheus Astro 5 Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: prometheus-astro5-playwright-report
          path: playgrounds/prometheus-astro5/playwright-report/
          retention-days: 30

  e2e-otel:
    name: 🧪 E2E Tests - OpenTelemetry
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build packages
        run: pnpm build:all

      - name: 🎭 Install Playwright browsers
        run: pnpx playwright install --with-deps

      - name: 🧪 Run OpenTelemetry E2E tests
        run: pnpm test:e2e:ci
        working-directory: playgrounds/otel

      - name: 📊 Upload OpenTelemetry test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: otel-e2e-results
          path: playgrounds/otel/test-results/
          retention-days: 30

      - name: 📊 Upload OpenTelemetry Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: otel-playwright-report
          path: playgrounds/otel/playwright-report/
          retention-days: 30

  ci-summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build-and-test, e2e-prometheus, e2e-prometheus-astro5, e2e-otel]
    # Only post CI summary comments on pull requests, but still respect all job results
    if: github.event_name == 'pull_request' && always()
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: 📊 Generate CI Summary
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue?.number || context.payload.pull_request?.number
            });

            // Find existing CI summary comment
            const existingComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 🚀 CI Pipeline Summary')
            );

            const lintStatus = '${{ needs.lint.result }}';
            const buildStatus = '${{ needs.build-and-test.result }}';
            const prometheusStatus = '${{ needs.e2e-prometheus.result }}';
            const prometheusAstro5Status = '${{ needs.e2e-prometheus-astro5.result }}';
            const otelStatus = '${{ needs.e2e-otel.result }}';

            const getStatusEmoji = (status) => {
              switch(status) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '⏹️';
                case 'skipped': return '⏭️';
                default: return '⏳';
              }
            };

            const summary = `## 🚀 CI Pipeline Summary

            | Job | Status | Details |
            |-----|--------|---------|
            | 🔍 Lint | ${getStatusEmoji(lintStatus)} | Code quality checks |
            | 🏗️ Build & Test | ${getStatusEmoji(buildStatus)} | TypeScript compilation & unit tests |
            | 🧪 E2E - Prometheus (Astro 6) | ${getStatusEmoji(prometheusStatus)} | Prometheus integration tests |
            | 🧪 E2E - Prometheus (Astro 5) | ${getStatusEmoji(prometheusAstro5Status)} | Prometheus integration tests on Astro 5 |
            | 🧪 E2E - OpenTelemetry | ${getStatusEmoji(otelStatus)} | OpenTelemetry integration tests |

            **Overall Status:** ${lintStatus === 'success' && buildStatus === 'success' && prometheusStatus === 'success' && prometheusAstro5Status === 'success' && otelStatus === 'success' ? '✅ All checks passed!' : '❌ Some checks failed'}

            <details>
            <summary>📋 Test Coverage</summary>

            - **Prometheus Integration**: OpenMetrics, Integration, Standalone metrics
            - **OpenTelemetry Integration**: Prometheus preset, HTTP mock-server, gRPC mock-server
            - **Total Tests**: ~51 tests across all playgrounds

            </details>

            ---
            *Generated by CI Pipeline - ${new Date().toISOString()}*`;

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: summary
              });
            } else if (context.payload.pull_request) {
              // Create new comment for PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: summary
              });
            }
